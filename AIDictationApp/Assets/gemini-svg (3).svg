<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="settings-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" /> <stop offset="100%" stop-color="#4FACFE" /> </linearGradient>

    <filter id="gear-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#005C97" flood-opacity="0.5"/>
    </filter>

    <mask id="center-hole">
      <rect x="0" y="0" width="64" height="64" fill="white" />
      <circle cx="32" cy="32" r="12" fill="black" />
    </mask>
  </defs>

  <g mask="url(#center-hole)" fill="url(#settings-grad)" filter="url(#gear-shadow)">
    <rect x="26" y="6" width="12" height="52" rx="4" />
    <rect x="26" y="6" width="12" height="52" rx="4" transform="rotate(45 32 32)" />
    <rect x="26" y="6" width="12" height="52" rx="4" transform="rotate(90 32 32)" />
    <rect x="26" y="6" width="12" height="52" rx="4" transform="rotate(135 32 32)" />
    
    <circle cx="32" cy="32" r="20" />
  </g>

  <circle cx="32" cy="32" r="12" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="2" />
  
  <circle cx="32" cy="32" r="19" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1" />
</svg>
